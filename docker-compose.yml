services:

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD:  ${DB_PASSWORD}
      MYSQL_DATABASE: report_db
    restart: unless-stopped


  springboot-app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/report_db
      SPRING_DATASOURCE_USERNAME:  ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD:  ${DB_PASSWORD}
    depends_on:
      - mysql
    restart: on-failure
